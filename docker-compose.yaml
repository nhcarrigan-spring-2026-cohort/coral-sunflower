#  - supabase-self-hosted/docker-compose.yml

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - node_modules:/app/node_modules
      - node_modules-frontend:/app/apps/frontend/node_modules
    ports:
      - "127.0.0.1:5173:5173"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  node_modules:
  node_modules-frontend:
